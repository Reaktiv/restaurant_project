{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="{% static 'restaurant/style.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-dark"
      style="background: url('/media/bacground_photo1.jpg') no-repeat center center fixed; background-size: cover;">

{% if user.is_authenticated %}
<style>
    .navbar-nav-scroll {
        overflow-x: auto;
        white-space: nowrap;
        scrollbar-width: none;
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: nowrap !important;
    }
    .navbar-nav-scroll::-webkit-scrollbar { display: none; }
</style>

<nav class="navbar navbar-dark fixed-top" style="background-color: rgba(37, 42, 43, 0.7); margin-bottom: 10px">
    <div class="container-fluid d-flex align-items-center" style="overflow: hidden;">
        <a href="https://bootstrapmade.com/demo/NiceRestaurant/"
           class="d-flex align-items-center text-decoration-none p-2 flex-shrink-0" style="color: white">
            <i class="bi bi-fork-knife fs-4 me-2" style="color: #CEAF7F"></i>
            <span class="fs-5 fw-lighter">NiceRestaurant</span>
        </a>

        <div class="navbar-nav-scroll flex-grow-1">
            <ul class="navbar-nav flex-row">
                <li class="nav-item">
                    <a class="nav-link px-3" href="{% url 'home' %}"
                       style="color: white; transition: 0.3s;"
                       onmouseover="this.style.color='#CEAF7F'"
                       onmouseout="this.style.color='white'">
                        <i class="bi bi-houses-fill"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="{% url 'create' %}"
                       style="color: white; transition: 0.3s;"
                       onmouseover="this.style.color='#CEAF7F'"
                       onmouseout="this.style.color='white'">
                        <i class="bi bi-plus"></i> Add
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="{% url 'food_page' %}"
                       style="color: white; transition: 0.3s;"
                       onmouseover="this.style.color='#CEAF7F'"
                       onmouseout="this.style.color='white'">
                        <i class="bi bi-egg-fried"></i> All
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="{% url 'cart' %}"
                       style="color: white; transition: 0.3s;"
                       onmouseover="this.style.color='#CEAF7F'"
                       onmouseout="this.style.color='white'">
                        <i class="bi bi-basket-fill"></i> Cart
                    </a>
                </li>
                {% block Categories %}{% endblock %}
                <li class="nav-item">
                    <a class="nav-link px-3" href="{% url 'profile' %}"
                       style="color: white; transition: 0.3s;"
                       onmouseover="this.style.color='#CEAF7F'"
                       onmouseout="this.style.color='white'">
                        Profile
                    </a>
                </li>
                <li class="nav-item">
                    <form action="{% url 'logout' %}" method="POST">
                        {% csrf_token %}
                        <button type="submit" class="nav-link border-0 px-3"
                                style="color: white; background: none; transition: 0.3s; cursor: pointer;"
                                onmouseover="this.style.color='#CEAF7F'"
                                onmouseout="this.style.color='white'">
                            Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script>
    document.getElementById('id_images').addEventListener('change', function (event) {
        const previewContainer = document.getElementById('preview');
        previewContainer.innerHTML = ''; // clear old previews

        Array.from(event.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.classList.add('img-thumbnail', 'm-2');
                img.style.width = '150px';
                previewContainer.appendChild(img);
            };
            reader.readAsDataURL(file);
        });
    });
</script>
<script src="{% static 'js/cart.js' %}"></script>
<div id="preview" class="d-flex flex-wrap mt-3"></div>

</body>
</html>
