{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Profilni Tahrirlash | NiceRestaurant{% endblock %}

{% block content %}
<div class="container animate-fade-up" style="margin-top: 130px; margin-bottom: 70px;">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            
            <div class="glass-panel p-4 p-md-5">
                <!-- Header -->
                <div class="text-center mb-4 pb-3 border-bottom border-secondary" style="border-color: rgba(206,175,127,0.15) !important;">
                    <i class="bi bi-person-gear text-gold display-4 mb-2 d-inline-block"></i>
                    <h3 class="text-white fw-light" style="font-family: var(--font-heading); letter-spacing: 1px;">Profilni Tahrirlash</h3>
                    <p class="text-secondary small mb-0">Shaxsiy ma'lumotlaringizni yangilang</p>
                </div>

                <!-- Form -->
                <form enctype="multipart/form-data" action="{% url 'change_profile' %}" method="POST" style="color: var(--gold-primary)">
                    {% csrf_token %}
                    
                    {{ u_form|crispy }}
                    {{ p_form|crispy }}
                    
                    <div class="row g-3 mt-4">
                        <div class="col-6">
                            <a href="{% url 'profile' %}" class="btn btn-outline-gold w-100 py-3 text-center">
                                Bekor qilish
                            </a>
                        </div>
                        <div class="col-6">
                            <button type="submit" class="btn btn-gold w-100 py-3">
                                💾 Saqlash
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
