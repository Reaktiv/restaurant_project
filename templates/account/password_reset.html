{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block title %}Password Reset{% endblock %}

{% block content %}
<style>
    .form-control {
        color: #aaa !important;
        background: #1a1a1a !important;
    }
    label {
        color: white !important;
    }
</style>

<div class="container">
    <div class="row justify-content-center" style="margin-top: 90px;">
        <div class="col-md-7">
            <div class="card border-0"
                 style="background: #111; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);">
                <div class="card-header border-0 text-center py-4"
                     style="background: rgba(206,175,127,0.08); border-bottom: 1px solid rgba(206,175,127,0.2) !important;">
                    <h4 style="color: #CEAF7F; margin: 0;">🔑 Reset Password</h4>
                </div>
                <div class="card-body p-4">
                    <p style="color: #aaa; text-align: center;">
                        Enter your email and we'll send you a reset link.
                    </p>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn w-100 mt-3"
                                style="background: rgba(206,175,127,0.15); border: 1px solid #CEAF7F; color: #CEAF7F;">
                            🔑 Send Reset Link
                        </button>
                    </form>
                    <div class="mt-3 text-center" style="color: #aaa;">
                        Remember your password?
                        <a href="{% url 'login' %}" style="color: #CEAF7F; text-decoration: none;">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
