{% extends 'base.html' %}
{% load static %}

{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center" style="margin-top: 90px;">
        <div class="col-md-7">
            <div class="card border-0"
                 style="background: #111; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);">
                <div class="card-header border-0 text-center py-4"
                     style="background: rgba(206,175,127,0.08); border-bottom: 1px solid rgba(206,175,127,0.2) !important;">
                    <h4 style="color: #CEAF7F; margin: 0;">✅ Password Changed</h4>
                </div>
                <div class="card-body p-4 text-center">
                    <p style="color: #aaa; font-size: 15px;">
                        Your password has been successfully updated.<br>
                        You can now log in with your new password.
                    </p>
                    <a href="{% url 'login' %}" class="btn w-100 mt-3"
                       style="background: rgba(206,175,127,0.15); border: 1px solid #CEAF7F; color: #CEAF7F; text-decoration: none;">
                        🔐 Go to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
