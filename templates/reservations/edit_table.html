{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
    Edit Table № {{ table.number }}
{% endblock %}

{% block content %}
    <style>
        /* Restoran umumiy oltin va to'q ranglar dizayni */
        .edit-form-container {
            background-color: rgba(37, 42, 43, 0.7) !important;
            border: 1px solid rgba(206, 175, 127, 0.2) !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3) !important;
        }

        /* Inputlar uslubi */
        .edit-form-container .form-control,
        .edit-form-container .form-select,
        .edit-form-container .form-check-input {
            color: #CEAF7F !important;
            background-color: rgba(30, 34, 32, 0.9) !important;
            border: 1px solid rgba(206, 175, 127, 0.3) !important;
            border-radius: 8px !important;
            padding: 12px 16px !important;
            font-size: 15px !important;
        }

        .edit-form-container .form-control:focus,
        .edit-form-container .form-select:focus {
            border-color: #CEAF7F !important;
            box-shadow: 0 0 0 3px rgba(206, 175, 127, 0.15) !important;
            background-color: rgba(30, 34, 32, 0.95) !important;
        }

        /* Matnlar va Yulduzchalar */
        .edit-form-container label {
            color: #CEAF7F !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            margin-bottom: 6px !important;
        }

        .edit-form-container .asteriskField {
            color: #CEAF7F !important;
        }

        .edit-form-container .form-text, .edit-form-container small {
            color: rgba(206, 175, 127, 0.6) !important;
        }

        /* Tugmalar dizayni */
        .btn-save {
            background-color: #CEAF7F !important;
            color: #1e2220 !important;
            border-radius: 50px !important;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            padding: 10px 30px !important;
            transition: 0.3s;
            border: 1px solid #CEAF7F !important;
        }

        .btn-save:hover {
            background-color: white !important;
            color: #CEAF7F !important;
            border-color: white !important;
        }

        .btn-cancel {
            background-color: transparent !important;
            color: rgba(206, 175, 127, 0.7) !important;
            border: 1px solid rgba(206, 175, 127, 0.4) !important;
            border-radius: 50px !important;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px 30px !important;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            color: #fff !important;
            border-color: #fff !important;
        }
    </style>

    <div class="container tables-container" style="margin-top: 90px; margin-bottom: 90px;">
        <div class="text-center mb-4">
            <h2 style="color: #CEAF7F;" class="fw-bold">Stolni tahrirlash</h2>
            <p class="text-white">№ {{ table.number }} — stol ma'lumotlarini o'zgartirish</p>
            <hr style="border: 1px solid #CEAF7F; width: 15%; margin: 10px auto; opacity: 0.4;">
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="p-4 p-md-5 edit-form-container">

                    <form method="POST" class="w-100">
                        {% csrf_token %}

                        <div class="mb-4">
                            {% crispy form %}
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-4">
                            <a href="{% url 'all_tables' %}" class="btn btn-cancel d-flex align-items-center">
                                Bekor qilish
                            </a>
                            <button type="submit" class="btn btn-save">
                                Saqlash
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
{% endblock %}
